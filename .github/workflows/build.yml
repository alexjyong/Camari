name: Build

on:
  workflow_dispatch:
    inputs:
      output_type:
        description: 'Android output type'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - both
      build_obs_plugin:
        description: 'Build OBS plugin (Windows x64 + macOS Universal)'
        required: false
        default: false
        type: boolean

jobs:

  android-build:
    name: Android (${{ inputs.output_type }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd mobile
          npm install

      - name: Run TypeScript/React tests
        run: |
          cd mobile
          npm test

      - name: Build web app
        run: |
          cd mobile
          npm run build

      - name: Sync Capacitor
        run: |
          cd mobile
          npx cap sync android

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Run Kotlin unit tests
        run: |
          cd mobile/android
          ./gradlew testDebugUnitTest

      - name: Decode keystore
        run: |
          echo "${{ secrets.JKS_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build release APK
        if: inputs.output_type == 'apk' || inputs.output_type == 'both'
        run: |
          cd mobile/android
          ./gradlew assembleRelease --quiet
          apksigner sign \
            --ks ../../keystore.jks \
            --ks-key-alias uploadkey \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.ALIAS_PASSWORD }} \
            --out app/build/outputs/apk/release/camari-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          apksigner verify --verbose app/build/outputs/apk/release/camari-release.apk

      - name: Build release AAB
        if: inputs.output_type == 'aab' || inputs.output_type == 'both'
        run: |
          cd mobile/android
          ./gradlew bundleRelease --quiet
          jarsigner -verbose \
            -keystore ../../keystore.jks \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.ALIAS_PASSWORD }} \
            app/build/outputs/bundle/release/app-release.aab uploadkey
          mv app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/camari-release.aab

      - name: Upload APK artifact
        if: inputs.output_type == 'apk' || inputs.output_type == 'both'
        uses: actions/upload-artifact@v7
        with:
          name: camari-apk
          if-no-files-found: error
          path: mobile/android/app/build/outputs/apk/release/camari-release.apk

      - name: Upload AAB artifact
        if: inputs.output_type == 'aab' || inputs.output_type == 'both'
        uses: actions/upload-artifact@v7
        with:
          name: camari-aab
          if-no-files-found: error
          path: mobile/android/app/build/outputs/bundle/release/camari-release.aab

  # ── OBS Plugin: Linux x64 ───────────────────────────────────────────────────
  obs-linux:
    name: OBS Plugin (Linux x64)
    if: inputs.build_obs_plugin
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: camari-obs-plugin

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: camari-obs-plugin-linux-x64
          path: camari-obs-plugin/build/camari-obs-plugin.so

  # ── OBS Plugin: Windows x64 ─────────────────────────────────────────────────
  obs-windows:
    name: OBS Plugin (Windows x64)
    if: inputs.build_obs_plugin
    runs-on: windows-2022
    defaults:
      run:
        working-directory: camari-obs-plugin

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install OBS Studio
        shell: pwsh
        run: |
          $url = "https://github.com/obsproject/obs-studio/releases/download/31.1.1/OBS-Studio-31.1.1-Windows-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\obs-installer.exe"
          Start-Process -FilePath "$env:TEMP\obs-installer.exe" -Args "/S" -Wait

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: cmake --install build --config Release --prefix dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: camari-obs-plugin-windows-x64
          path: camari-obs-plugin/dist/

  # ── OBS Plugin: macOS Universal ─────────────────────────────────────────────
  obs-macos:
    name: OBS Plugin (macOS Universal)
    if: inputs.build_obs_plugin
    runs-on: macos-14
    defaults:
      run:
        working-directory: camari-obs-plugin

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install OBS Studio
        run: brew install --quiet obs-studio

      - name: Configure (x86_64)
        run: cmake -B build-x86 -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64

      - name: Configure (arm64)
        run: cmake -B build-arm -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build (x86_64)
        run: cmake --build build-x86 --config Release

      - name: Build (arm64)
        run: cmake --build build-arm --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: camari-obs-plugin-macos
          path: |
            camari-obs-plugin/build-x86/
            camari-obs-plugin/build-arm/
